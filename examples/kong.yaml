_format_version: "3.0"

services:
  # OBO 検証用の Service/Route。
  # upstream は token B の正規の audience である downstream API（.env の DECK_DOWNSTREAM_URL）。
  # 実トークン（token B）が送られるのはこの downstream API だけ（docs/04）。
  # DECK_DOWNSTREAM_URL は https:// 必須（token B を平文送信しないため）で、
  # DECK_SCOPE の audience と対応する URL にすること（docs/04 §1 の sync 前確認参照）。
  # トークンなし / 不正なトークンは obo プラグインが upstream 到達前に 401 で拒否するため、
  # 配線確認（docs/04 §2）もこの Route で行う。
  - name: downstream-service
    url: ${{ env "DECK_DOWNSTREAM_URL" }}
    routes:
      - name: downstream-route
        paths:
          - /downstream
        protocols:
          - http
          - https
        methods:
          - GET
        strip_path: true
    plugins:
      - name: obo
        config:
          tenant_id: ${{ env "DECK_TENANT_ID" }}
          client_id: ${{ env "DECK_CLIENT_ID" }}
          client_secret: ${{ env "DECK_CLIENT_SECRET" }}
          scopes:
            - ${{ env "DECK_SCOPE" }}
          audience: ${{ env "DECK_AUDIENCE" }}
