x-default: &default
  networks:
    - sandbox-network

networks:
  sandbox-network:

services:
  kong:
    <<: *default
    container_name: kong
    # obo プラグイン入りイメージをローカルビルドする（ベースは kong/kong-gateway:3.14.0.7、Dockerfile 参照）
    build: .
    environment:
      # カスタムプラグイン obo をロードする（Konnect 側へのスキーマ登録も必要。README §3.5 参照）
      KONG_PLUGINS: bundled,obo
      KONG_ROLE: data_plane
      KONG_DATABASE: off
      KONG_VITALS: off
      KONG_CLUSTER_MTLS: pki
      KONG_CLUSTER_CONTROL_PLANE: ${PREFIX:-}.us.cp.konghq.com:443
      KONG_CLUSTER_SERVER_NAME: ${PREFIX:-}.us.cp.konghq.com
      KONG_CLUSTER_TELEMETRY_ENDPOINT: ${PREFIX:-}.us.tp.konghq.com:443
      KONG_CLUSTER_TELEMETRY_SERVER_NAME: ${PREFIX:-}.us.tp.konghq.com
      KONG_CLUSTER_CERT: /etc/kong/cluster-certs/cluster.crt
      KONG_CLUSTER_CERT_KEY: /etc/kong/cluster-certs/cluster.key
      KONG_LUA_SSL_TRUSTED_CERTIFICATE: system
      KONG_KONNECT_MODE: on
      KONG_CLUSTER_DP_LABELS: type:docker-macOsArmOS
      KONG_ROUTER_FLAVOR: expressions
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_TRACING_INSTRUMENTATIONS: all
      KONG_TRACING_SAMPLING_RATE: 1.0
      KONG_LOG_LEVEL: debug
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    ports:
      - 8000:8000
      - 8100:8100
    volumes:
      - ./cluster-certs:/etc/kong/cluster-certs
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Observability
  # ============================================================
  otel-lgtm:
    <<: *default
    container_name: otel-lgtm
    image: grafana/otel-lgtm:0.25.0
    ports:
      - 3000:3000
      - 4317:4317
      - 4318:4318
